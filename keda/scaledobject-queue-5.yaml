apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-redis-queue-5
  namespace: keda-demo
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 10
  cooldownPeriod: 30
  triggers:
    - type: redis
      metadata:
        address: redis.keda-demo.svc.cluster.local:6379
        listName: highlight-jobs
        listLength: "5"
