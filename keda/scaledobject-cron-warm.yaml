apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-cron-warm
  namespace: keda-demo
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 0
  maxReplicaCount: 8
  pollingInterval: 10
  cooldownPeriod: 45
  triggers:
    - type: cron
      metadata:
        timezone: UTC
        start: "0 8 * * 1-5"
        end: "0 18 * * 1-5"
        desiredReplicas: "2"
    - type: redis
      metadata:
        address: redis.keda-demo.svc.cluster.local:6379
        listName: highlight-jobs
        listLength: "5"
