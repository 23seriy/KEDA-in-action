apiVersion: v1
kind: ServiceAccount
metadata:
  name: producer
  namespace: keda-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: producer-read-deployments
  namespace: keda-demo
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: producer-read-deployments
  namespace: keda-demo
subjects:
  - kind: ServiceAccount
    name: producer
    namespace: keda-demo
roleRef:
  kind: Role
  name: producer-read-deployments
  apiGroup: rbac.authorization.k8s.io
