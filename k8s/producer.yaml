apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: keda-demo
  labels:
    app: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      serviceAccountName: producer
      containers:
        - name: producer
          image: keda-demo/producer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_QUEUE_HOST
              value: redis
            - name: REDIS_QUEUE_PORT
              value: "6379"
            - name: QUEUE_NAME
              value: highlight-jobs
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
