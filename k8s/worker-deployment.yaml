apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: keda-demo
  labels:
    app: worker
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: keda-demo/worker:latest
          imagePullPolicy: Never
          env:
            - name: REDIS_QUEUE_HOST
              value: redis
            - name: REDIS_QUEUE_PORT
              value: "6379"
            - name: QUEUE_NAME
              value: highlight-jobs
          livenessProbe:
            exec:
              command: ["python", "-c", "import redis; r=redis.Redis('redis',6379); r.ping()"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
